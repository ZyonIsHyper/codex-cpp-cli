name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  windows-build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S . -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DCODEX_CPP_BUILD_EXE=ON
          -DCODEX_CPP_BUILD_STATIC_LIB=ON
          -DCODEX_CPP_BUILD_SHARED_LIB=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Smoke test
        run: .\build\Release\codex-cpp.exe --version
