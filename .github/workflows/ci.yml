name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  windows-build:
    runs-on: windows-2022
    env:
      CODEX_CPP_CMAKE_GENERATOR: Visual Studio 17 2022
      CODEX_CPP_CMAKE_ARCH: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        shell: cmd
        run: build.bat Release

      - name: Run tests
        shell: cmd
        run: test.bat Release

      - name: Verify artifacts
        shell: cmd
        run: verify-artifacts.bat Release
